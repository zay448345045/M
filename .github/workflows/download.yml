name: Download and Release (Multi-threaded)

on:
  workflow_dispatch:

jobs:
  download_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Multi-threaded Download
        env:
          SP_COOKIE: ${{ secrets.git }}
        run: |
          echo "--- 开始多线程下载 ---"
          URL="https://file-cdn.gitcode.com/4141677/releases/untagger_60fcc5281c2f4565974dd9812dac73a0/justpiano_50.apk?auth_key=1772365579-3537277bd77f44fd8f8780e42a3aab0f-0-73cb1b4f72b4fcc26f7eb2549b02db974324a97f3a1907872f60fd72e42c5485"

          # -x 16 表示使用 16 个线程
          aria2c -x 16 -s 16 \
                 --header="Cookie: $SP_COOKIE" \
                 --user-agent="Mozilla/5.0" \
                 "$URL"

          echo "--- 下载完成，查看文件 ---"
          ls -lh

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "download-v${{ github.run_number }}"
          name: "Download v${{ github.run_number }}"
          body: |
            ## 多线程下载完成
            - 自动获取文件名，无需手动指定。
          files: ./*