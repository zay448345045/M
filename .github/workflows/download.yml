name: Download and Release gitcode

on:
  workflow_dispatch: # 手动触发

jobs:
  download_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许创建 Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        run: |
          # 创建下载目录，避免文件混乱
          mkdir -p ./downloads
          echo "DOWNLOAD_DIR=$(pwd)/downloads" >> $GITHUB_ENV

      - name: Download File
        env:
          SP_COOKIE: ${{ secrets.git }}
          FILE_URL: "https://file-cdn.gitcode.com/4141677/releases/untagger_60fcc5281c2f4565974dd9812dac73a0/justpiano_50.apk?auth_key=1772366853-17a081d8f13e4a3480c87045d273f949-0-4e609b0d83916f726a89d7c34ce9f50a8a27ee002bdf500a7954e6621d27518d"
        run: |
          echo "--- 步骤 1: 开始下载文件 ---"
          
          # 下载文件到指定目录，自动获取文件名
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Cookie: $SP_COOKIE" \
               -OJ "$FILE_URL" \
               --output-dir $DOWNLOAD_DIR \
               --fail \
               --show-error \
               --silent

          echo "--- 步骤 2: 验证下载结果 ---"
          # 检查下载目录中的文件
          DOWNLOAD_FILE=$(ls $DOWNLOAD_DIR/*.apk 2>/dev/null | head -n 1)
          
          # 如果没有找到APK文件，终止工作流
          if [ -z "$DOWNLOAD_FILE" ]; then
            echo "❌ 错误：未找到下载的APK文件"
            ls -lh $DOWNLOAD_DIR
            exit 1
          fi
          
          echo "✅ 成功下载文件: $DOWNLOAD_FILE"
          echo "DOWNLOADED_FILE=$DOWNLOAD_FILE" >> $GITHUB_ENV
          
          # 显示文件信息
          ls -lh $DOWNLOAD_FILE
          sha256sum $DOWNLOAD_FILE

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "download-v${{ github.run_number }}"
          name: "Download v${{ github.run_number }}"
          body: |
            ## 📥 下载完成
            - 文件来源: GitCode
            - 文件名称: ${{ env.DOWNLOADED_FILE }}
            - 下载时间: ${{ github.run_at }}
            
            ### 文件信息